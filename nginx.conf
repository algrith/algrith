limit_req_zone $binary_remote_addr zone=algrith:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

map $http_user_agent $blocked_agent {
  default          0;
  ~*sppb-rce-poc   1;
  ~*sqlmap         1;
  ~*nikto          1;
  ~*masscan        1;
  ~*zgrab          1;
  ~*python-httpx   1;
  ~*go-http-client 1;
}

server {
  listen 8080;

  add_header Content-Security-Policy "frame-ancestors 'self' https://paystack.com https://*.paystack.com" always;

  if ($blocked_agent) {
    return 403;
  }
  
  location = /sitemap.xml {
    proxy_pass http://localhost:3000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
  }

  # Block common vulnerability scan paths
  location ~* ^/(wp-admin|wp-login|phpmyadmin|adminer|shell|config|backup) {
    return 403;
  }

  location ~* \.(php|asp|aspx|jsp|cgi|sh|env|bak|sql|tar|gz|zip)$ {
    return 403;
  }

  location /socket/emit {
    proxy_pass http://localhost:3001/emit;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
  }

  location /socket {
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://localhost:3001;
    proxy_set_header Host $host;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_http_version 1.1;
  }

  location /api/ {
    limit_req zone=api burst=50 nodelay;
    proxy_pass http://localhost:3000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    limit_req_status 429;
  }

  location / {
    limit_req zone=algrith burst=100 nodelay;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass http://localhost:3000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    limit_req_status 429;
  }
}